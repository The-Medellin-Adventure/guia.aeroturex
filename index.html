<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>

    --surface-2:#f4ecdc;

    --red:#dd8b7e;
    --blue:#7fabc0;
    --green:#84ac93;
    --line:rgba(51,46,36,.12);
    --line-dark:rgba(51,46,36,.14);
    --radius:18px;
    --shadow:0 20px 45px -26px rgba(51,46,36,.28);

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);}
  #root{width:100%;min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;position:relative;overflow-x:hidden;}

  .lang-btn{border:none;background:transparent;color:var(--ink-soft);font-family:'Inter',sans-serif;font-size:14px;

  .ghost-btn:hover{background:var(--surface-2);border-color:rgba(51,46,36,.25);}
  .ghost-btn.solid{background:var(--ochre);color:#3a2205;border-color:var(--ochre);}
  .ghost-btn.solid:hover{background:#eab568;}

  /* ---------- hero ---------- */
  .hero{position:relative;padding:56px 28px 36px;overflow:hidden;}
  .hero-stripes{position:absolute;left:0;right:0;bottom:0;height:8px;display:flex;opacity:.8;}
  .hero-stripes span{flex:1;height:100%;}
  .hero-inner{max-width:1180px;margin:0 auto;position:relative;z-index:2;}
  .eyebrow{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#c98a3a;margin-bottom:14px;}
  .hero h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(32px,5vw,54px);line-height:1.04;letter-spacing:-.02em;margin:0 0 16px;max-width:760px;color:var(--ink);}
  .hero h1 em{font-style:normal;color:#c98a3a;}
  .hero p.lead{max-width:560px;color:var(--ink-soft);font-size:16px;line-height:1.6;margin:0 0 28px;}
  .hero-meta{display:flex;gap:28px;flex-wrap:wrap;margin-top:8px;}
  .hero-meta div{border-left:2px solid var(--ochre);padding-left:12px;}
  .hero-meta .num{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:24px;color:var(--ink);}
  .hero-meta .lbl{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.1em;margin-top:2px;}

  /* ---------- layout ---------- */
  .layout{max-width:1180px;margin:0 auto;padding:12px 28px 100px;display:grid;grid-template-columns:340px 1fr;gap:28px;}
  @media (max-width:900px){.layout{grid-template-columns:1fr;}}

  /* ---------- route timeline (signature element) ---------- */
  .route-panel{background:var(--bg-soft);border:1px solid var(--line-dark);border-radius:var(--radius);padding:22px 18px;position:relative;}
  .route-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:15px;margin:0 0 4px;color:var(--ink);}
  .route-sub{font-size:12px;color:var(--ink-soft);margin:0 0 18px;}
  .route-svg-wrap{position:relative;padding-left:6px;}
  .stop-row{position:relative;display:flex;gap:14px;padding-bottom:26px;cursor:pointer;}
  .stop-row:last-child{padding-bottom:0;}
  .stop-row .rail{position:relative;width:34px;flex:none;display:flex;flex-direction:column;align-items:center;}
  .stop-row .rail .line{position:absolute;top:34px;bottom:-26px;width:3px;background:repeating-linear-gradient(to bottom,var(--line-dark) 0 6px, transparent 6px 12px);border-radius:3px;}
  .stop-row:last-child .rail .line{display:none;}
  .stop-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;
    border:2px solid var(--bg-soft);box-shadow:0 0 0 2px rgba(51,46,36,.08);transition:.2s;flex:none;z-index:1;background:#333;}
  .stop-row.active .stop-dot{box-shadow:0 0 0 3px var(--ochre);transform:scale(1.06);}
  .stop-body{padding-top:3px;}
  .stop-idx{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--ink-soft);letter-spacing:.08em;}
  .stop-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:14.5px;margin-top:2px;line-height:1.25;color:var(--ink);}
  .stop-teaser{font-size:12.5px;color:var(--ink-soft);margin-top:3px;line-height:1.4;}
  .stop-row:hover .stop-name{color:#c98a3a;}

  /* ---------- detail panel ---------- */
  .detail-card{background:var(--surface);color:var(--ink);border-radius:24px;padding:0;box-shadow:var(--shadow);overflow:hidden;
    min-height:520px;display:flex;flex-direction:column;}
  .detail-head{padding:26px 30px 0;}
  .detail-eyebrow{font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-soft);
    display:flex;align-items:center;gap:8px;}
  .detail-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:30px;letter-spacing:-.01em;margin:8px 0 4px;}
  .vehicle-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border-radius:999px;padding:5px 12px;
    font-size:12px;font-weight:600;color:var(--ink-soft);margin-top:8px;}

  .stage{display:grid;grid-template-columns:220px 1fr;gap:0;flex:1;}

  .avatar-stagebg{width:170px;height:170px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #fff7e0, var(--surface-2) 70%);
    display:flex;align-items:center;justify-content:center;position:relative;}
  .avatar-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:13px;}
  .avatar-role{font-size:11px;color:var(--ink-soft);text-align:center;max-width:170px;}

  .controls{display:flex;gap:8px;margin-top:2px;}
  .play-btn{width:48px;height:48px;border-radius:50%;border:none;background:var(--ink);color:var(--surface);cursor:pointer;

  .icon-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--line-dark);background:transparent;color:var(--ink);

  .modal h3{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;margin:0 0 18px;}
  .field-label{font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 6px;display:block;}

  .lang-tab.active{background:var(--ink);color:var(--surface);border-color:var(--ink);}

  .icon-pick{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px;}
  .icon-pick button{width:38px;height:38px;border-radius:10px;border:1px solid var(--line-dark);background:#fff;font-size:16px;cursor:pointer;}
  .icon-pick button.sel{border-color:var(--ink);background:var(--surface-2);}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;}
  .btn-primary{background:var(--ink);color:var(--surface);border:none;padding:10px 20px;border-radius:999px;font-weight:700;font-size:13.5px;cursor:pointer;}

  .talk-waves span:nth-child(1){animation-delay:0s;}
  .talk-waves span:nth-child(2){animation-delay:.12s;}
  .talk-waves span:nth-child(3){animation-delay:.24s;}
  .talk-waves span:nth-child(4){animation-delay:.36s;}
  @keyframes wavebounce{0%,100%{height:4px;}50%{height:16px;}}

  .url-add-row{display:flex;gap:8px;margin-top:10px;}

  .admin-avatar-card{background:var(--surface);border:1px solid var(--line-dark);border-radius:16px;padding:22px;display:flex;gap:22px;flex-wrap:wrap;align-items:flex-start;margin-bottom:16px;}

  .admin-avatar-preview img,.admin-avatar-preview video{width:100%;height:100%;object-fit:cover;}
  .admin-avatar-fields{flex:1;min-width:220px;}
  .avatar-video-wrap{width:100%;height:100%;border-radius:50%;overflow:hidden;}
  .avatar-video-wrap video{width:100%;height:100%;object-fit:cover;display:block;}

  /* ---------- other tours (bottom CTA section) ---------- */
  .other-tours{background:var(--bg-soft);border-top:1px solid var(--line-dark);padding:48px 28px 60px;}
  .other-tours-inner{max-width:1180px;margin:0 auto;}
  .ot-head{margin-bottom:24px;}
  .ot-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:24px;color:var(--ink);}
  .ot-sub{font-size:13.5px;color:var(--ink-soft);margin-top:4px;}
  .ot-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px;}
  .ot-card{background:var(--surface);border:1px solid var(--line-dark);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:.2s;}
  .ot-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
  .ot-card-img{height:120px;background:linear-gradient(135deg,var(--ochre),var(--blue));display:flex;align-items:center;justify-content:center;font-size:30px;}
  .ot-card-img img{width:100%;height:100%;object-fit:cover;}
  .ot-card-body{padding:16px;flex:1;display:flex;flex-direction:column;}
  .ot-card-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:15px;color:var(--ink);margin-bottom:6px;}
  .ot-card-teaser{font-size:12.5px;color:var(--ink-soft);line-height:1.45;flex:1;}
  .ot-card-cta{margin-top:12px;font-size:12.5px;font-weight:700;color:#c98a3a;display:inline-flex;align-items:center;gap:4px;}
  .ot-admin-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--surface-2);}
</style>

let STATE = {
  lang: "es",
  view: "tour",          // tour | admin
  activeStopId: null,
  data: JSON.parse(JSON.stringify(DEFAULT_DATA)),
  adminUnlocked: false,
  adminTab: "stops",
  speaking: false,
  paused: false,
  modal: null,           // {type:'stop'|'vehicle'|'pw', payload}
  toast: null,
  storageOk: true,
  carouselIndex: {}
};

// Storage: the site's content (stops, vehicles, avatar, other tours, and the
// site access code) lives server-side in Vercel Blob, behind /api/data.
// GET is public (but strips accessCode unless the caller has a valid admin
// session cookie); POST requires a valid admin session cookie, checked
// server-side in /api/data.js — never trust the client-side STATE.adminUnlocked
// flag for anything security-relevant, it's UI-only.
async function loadData(){
  try{
    const res = await fetch('/api/data', { credentials:'same-origin' });
    const json = await res.json();
    STATE.isAdminSession = !!json.isAdmin;
    const parsed = json && json.data;
    if(parsed && parsed.stops && parsed.vehicles){
      STATE.data = Object.assign({}, DEFAULT_DATA, parsed);
      if(!STATE.data.avatar) STATE.data.avatar = { photo:null, video:null, name:"Andrea" };
      if(!('video' in STATE.data.avatar)) STATE.data.avatar.video = null;
      STATE.data.stops.forEach(s=>{
        if(!Array.isArray(s.images)){
          s.images = s.image ? [s.image] : [];
          delete s.image;
        }
      });
      if(!Array.isArray(STATE.data.otherTours)) STATE.data.otherTours = JSON.parse(JSON.stringify(DEFAULT_DATA.otherTours));
    } else if(parsed && typeof parsed.accessCode === 'string'){
      // Server has only a partial record so far (e.g. right after /setup.html) —
      // keep the client defaults for content, but still surface the real access code.
      STATE.data.accessCode = parsed.accessCode;
    }
  }catch(e){ /* server unreachable -> keep defaults, editing will fail until it's back */ }
  render();
}
async function persist(){
  try{
    const res = await fetch('/api/data', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'same-origin',
      body: JSON.stringify(STATE.data)
    });
    STATE.storageOk = res.ok;
    if(!res.ok && res.status === 403){
      // admin cookie expired or missing — force re-login
      STATE.adminUnlocked = false;
      showToast(t('pwWrong'));
    }
  }catch(e){ STATE.storageOk = false; }
}
async function submitAdminPassword(password){
  try{
    const res = await fetch('/api/admin-login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'same-origin',
      body: JSON.stringify({ password })
    });
    if(res.ok){
      STATE.adminUnlocked = true;
      STATE.modal = null;
      await loadData(); // re-fetch now that we carry an admin cookie, so accessCode becomes visible
    } else {
      const json = await res.json().catch(()=>({}));
      showToast(json.error === 'wrong password' ? t('pwWrong') : t('pwServerError'));
    }
  }catch(e){ showToast(t('pwServerError')); }
  render();
}
async function adminLogout(){
  try{ await fetch('/api/logout', { method:'POST', credentials:'same-origin' }); }catch(e){}
  STATE.adminUnlocked = false;
  STATE.isAdminSession = false;
  render();
}
function showToast(msg){
  STATE.toast = msg;
  render();
  setTimeout(()=>{ STATE.toast=null; render(); }, 2200);
}

/* ============================================================
   IMAGE HELPERS — resize/compress before storing as base64
   ============================================================ */
function resizeImageFile(file, maxW, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxW){ h = Math.round(h * (maxW / w)); w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}


/* ============================================================
   SPEECH
   ============================================================ */
let currentUtterance = null;
function pickVoice(langCode){
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  return voices.find(v=>v.lang === langCode) || voices.find(v=>v.lang && v.lang.startsWith(langCode.slice(0,2))) || null;
}
function speak(text, uiLang){
  if(!window.speechSynthesis){ showToast("Speech synthesis no disponible en este navegador"); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const langCode = SPEECH_LANG[uiLang] || "es-CO";
  u.lang = langCode;
  const v = pickVoice(langCode);
  if(v) u.voice = v;
  u.rate = 0.98;
  u.onstart = ()=>{ STATE.speaking = true; STATE.paused=false; render(); };
  u.onend = ()=>{ STATE.speaking = false; STATE.paused=false; render(); };
  u.onerror = ()=>{ STATE.speaking = false; STATE.paused=false; render(); };
  currentUtterance = u;
  window.speechSynthesis.speak(u);
}
function stopSpeech(){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  STATE.speaking = false; STATE.paused = false;
}
function togglePause(){
  if(!window.speechSynthesis) return;
  if(STATE.paused){ window.speechSynthesis.resume(); STATE.paused=false; }
  else { window.speechSynthesis.pause(); STATE.paused=true; }
  render();
}
if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged = ()=>{};
}

function sortedStops(){ return [...STATE.data.stops].sort((a,b)=>a.order-b.order); }
function esc(str){ return String(str==null?"":str).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function uid(prefix){ return prefix+"-"+Math.random().toString(36).slice(2,9); }

function render(){
  const root = document.getElementById('root');
  root.innerHTML = `
    ${renderTopbar()}
    ${STATE.view==='tour' ? renderTour() : renderAdmin()}
    ${renderModal()}
    ${STATE.toast ? `<div class="toast">${esc(STATE.toast)}</div>` : ''}
  `;
  attachHandlers();
  const avatarVideoEl = document.getElementById('avatar-video-el');
  if(avatarVideoEl){
    const speaking = avatarVideoEl.closest('[data-avatar-speaking]');
    const isSpeaking = speaking && speaking.getAttribute('data-avatar-speaking') === '1';
    if(isSpeaking){ avatarVideoEl.play().catch(()=>{}); }
    else { avatarVideoEl.pause(); }
  }
}

/* ============================================================
   EVENT HANDLING (delegated)
   ============================================================ */
let pendingIcon = null, pendingEmoji = null, pendingStopImages = undefined, pendingTourImage = undefined;

function attachHandlers(){
  const root = document.getElementById('root');
  root.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click', onAction);
  });
  const stopImgInput = document.getElementById('stop-image-input');
  if(stopImgInput) stopImgInput.addEventListener('change', handleStopImageChange);
  const avatarPhotoInput = document.getElementById('avatar-photo-input');
  if(avatarPhotoInput) avatarPhotoInput.addEventListener('change', handleAvatarPhotoChange);
  const tourImgInput = document.getElementById('tour-image-input');
  if(tourImgInput) tourImgInput.addEventListener('change', handleTourImageChange);
}

async function handleStopImageChange(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  if(pendingStopImages && pendingStopImages.length >= 5){ showToast(t('maxImagesReached')); return; }
  try{
    const dataUrl = await resizeImageFile(file, 1000, 0.75);
    if(!pendingStopImages) pendingStopImages = [];
    pendingStopImages.push(dataUrl);
    syncModalFieldsThenRerender(()=>{});
  }catch(err){ showToast('⚠️ ' + err); }
}

async function handleAvatarPhotoChange(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  try{
    const dataUrl = await resizeImageFile(file, 500, 0.85);
    if(!STATE.data.avatar) STATE.data.avatar = {photo:null, video:null, name:"Andrea"};
    STATE.data.avatar.photo = dataUrl;
    persist(); showToast(t('saved')); render();
  }catch(err){ showToast('⚠️ ' + err); }
}

async function handleTourImageChange(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  try{
    const dataUrl = await resizeImageFile(file, 800, 0.78);
    pendingTourImage = dataUrl;
    syncModalFieldsThenRerender(()=>{});
  }catch(err){ showToast('⚠️ ' + err); }
}

function onAction(e){
  const el = e.currentTarget;
  const action = el.getAttribute('data-action');

  switch(action){
    case 'setlang':
      STATE.lang = el.getAttribute('data-lang');
      stopSpeech();
      render();
      break;

    case 'goto-admin':
      STATE.view = 'admin'; stopSpeech(); render();
      break;
    case 'goto-tour':
      STATE.view = 'tour'; render();
      break;

    case 'open-stop':
      STATE.activeStopId = el.getAttribute('data-id');
      stopSpeech();
      render();
      break;

    case 'speak-toggle': {
      const id = el.getAttribute('data-id');
      const stop = getStop(id);
      const text = (stop.narration && stop.narration[STATE.lang]) || '';
      const isThisSpeaking = STATE.speaking && currentUtterance && currentUtterance.text === text;
      if(isThisSpeaking){ togglePause(); }
      else { speak(text, STATE.lang); }
      break;
    }
    case 'replay': {
      const id = el.getAttribute('data-id');
      const stop = getStop(id);
      const text = (stop.narration && stop.narration[STATE.lang]) || '';
      speak(text, STATE.lang);
      break;
    }

    case 'carousel-prev': {
      const id = el.getAttribute('data-id');
      STATE.carouselIndex[id] = (STATE.carouselIndex[id]||0) - 1;
      render();
      break;
    }
    case 'carousel-next': {
      const id = el.getAttribute('data-id');
      STATE.carouselIndex[id] = (STATE.carouselIndex[id]||0) + 1;
      render();
      break;
    }

    case 'open-pw-modal':
      STATE.modal = {type:'pw'}; render();
      setTimeout(()=>{ const i=document.getElementById('pw-input'); if(i) i.focus(); },0);
      break;
    case 'submit-pw': {
      const val = document.getElementById('pw-input').value;
      submitAdminPassword(val);
      break;
    }

    case 'admin-tab':
      STATE.adminTab = el.getAttribute('data-tab'); render();
      break;

    case 'new-stop':
      modalLangTab = STATE.lang; pendingIcon = 'pin'; capturedStopFields = null; pendingStopImages = undefined;
      STATE.modal = {type:'stop', payload:{}}; render();
      break;
    case 'edit-stop':
      modalLangTab = STATE.lang; capturedStopFields = null; pendingStopImages = undefined;
      pendingIcon = getStop(el.getAttribute('data-id')).icon;
      STATE.modal = {type:'stop', payload:{id: el.getAttribute('data-id')}}; render();
      break;
    case 'delete-stop':
      if(confirm(t('confirmDelete'))){
        STATE.data.stops = STATE.data.stops.filter(s=>s.id!==el.getAttribute('data-id'));
        if(STATE.activeStopId === el.getAttribute('data-id')) STATE.activeStopId = null;
        persist(); showToast(t('deleted')); render();
      }
      break;
    case 'move-stop': {
      const id = el.getAttribute('data-id'); const dir = el.getAttribute('data-dir');
      const arr = sortedStops();
      const idx = arr.findIndex(s=>s.id===id);
      const swapIdx = dir==='up' ? idx-1 : idx+1;
      if(swapIdx>=0 && swapIdx<arr.length){
        const a = arr[idx], b = arr[swapIdx];
        const tmp = a.order; a.order = b.order; b.order = tmp;
        persist(); render();
      }
      break;
    }
    case 'pick-icon':
      pendingIcon = el.getAttribute('data-icon');
      // re-render modal only, preserving field values already typed
      syncModalFieldsThenRerender(()=>{ STATE.modal.payload = STATE.modal.payload||{}; });
      break;

    case 'remove-stop-image-at': {
      const idx = parseInt(el.getAttribute('data-idx'),10);
      if(pendingStopImages) pendingStopImages.splice(idx,1);
      syncModalFieldsThenRerender(()=>{});
      break;
    }
    case 'add-stop-image-url': {
      const urlInput = document.getElementById('stop-image-url-input');
      const val = urlInput ? urlInput.value.trim() : '';
      if(val){
        if(!pendingStopImages) pendingStopImages = [];
        if(pendingStopImages.length >= 5){ showToast(t('maxImagesReached')); }
        else { pendingStopImages.push(val); syncModalFieldsThenRerender(()=>{}); }
      }
      break;
    }

    case 'new-vehicle':
      modalLangTab = STATE.lang; pendingEmoji = '🚗'; capturedVehicleFields = null;
      STATE.modal = {type:'vehicle', payload:{}}; render();
      break;
    case 'edit-vehicle':
      modalLangTab = STATE.lang; capturedVehicleFields = null;
      pendingEmoji = getVehicle(el.getAttribute('data-id')).icon;
      STATE.modal = {type:'vehicle', payload:{id: el.getAttribute('data-id')}}; render();
      break;
    case 'delete-vehicle':
      if(confirm(t('confirmDelete'))){
        const id = el.getAttribute('data-id');
        STATE.data.vehicles = STATE.data.vehicles.filter(v=>v.id!==id);
        STATE.data.stops.forEach(s=>{ if(s.vehicleId===id) s.vehicleId=""; });
        persist(); showToast(t('deleted')); render();
      }
      break;
    case 'pick-vemoji':
      pendingEmoji = el.getAttribute('data-emoji');
      render();
      break;

    case 'new-tour':
      modalLangTab = STATE.lang; capturedTourFields = null; pendingTourImage = undefined;
      STATE.modal = {type:'tour', payload:{}}; render();
      break;
    case 'edit-tour':
      modalLangTab = STATE.lang; capturedTourFields = null; pendingTourImage = undefined;
      STATE.modal = {type:'tour', payload:{id: el.getAttribute('data-id')}}; render();
      break;
    case 'delete-tour':
      if(confirm(t('confirmDelete'))){
        const id = el.getAttribute('data-id');
        STATE.data.otherTours = STATE.data.otherTours.filter(x=>x.id!==id);
        persist(); showToast(t('deleted')); render();
      }
      break;
    case 'remove-tour-image':
      pendingTourImage = null;
      syncModalFieldsThenRerender(()=>{});
      break;
    case 'add-tour-image-url': {
      const urlInput = document.getElementById('tour-image-url-input');
      const val = urlInput ? urlInput.value.trim() : '';
      if(val){ pendingTourImage = val; syncModalFieldsThenRerender(()=>{}); }
      break;
    }

    case 'modal-lang-tab':
      captureModalFields();
      modalLangTab = el.getAttribute('data-lang');
      render();
      break;

    case 'save-stop': {
      captureModalFields();
      const id = el.getAttribute('data-id');
      const langsData = collectStopFieldsFromDom();
      const finalImages = pendingStopImages !== undefined ? pendingStopImages : [];
      if(id){
        const s = getStop(id);
        Object.assign(s, {icon: pendingIcon || s.icon, vehicleId: document.getElementById('stop-vehicle').value, images: finalImages, name: langsData.name, teaser: langsData.teaser, narration: langsData.narration});
      } else {
        const maxOrder = STATE.data.stops.reduce((m,s)=>Math.max(m,s.order),0);
        STATE.data.stops.push({ id: uid('st'), order: maxOrder+1, icon: pendingIcon||'pin',
          vehicleId: document.getElementById('stop-vehicle').value, images: finalImages,
          name: langsData.name, teaser: langsData.teaser, narration: langsData.narration });
      }
      pendingStopImages = undefined;
      STATE.modal = null; persist(); showToast(t('saved')); render();
      break;
    }

    case 'save-tour': {
      captureModalFields();
      const id = el.getAttribute('data-id');
      const langsData = collectTourFieldsFromDom();
      const finalImage = pendingTourImage !== undefined ? pendingTourImage : null;
      if(!STATE.data.otherTours) STATE.data.otherTours = [];
      if(id){
        const tour = STATE.data.otherTours.find(x=>x.id===id);
        Object.assign(tour, {url: langsData.url, image: finalImage, name: langsData.name, teaser: langsData.teaser});
      } else {
        STATE.data.otherTours.push({ id: uid('tour'), url: langsData.url, image: finalImage, name: langsData.name, teaser: langsData.teaser });
      }
      pendingTourImage = undefined;
      STATE.modal = null; persist(); showToast(t('saved')); render();
      break;
    }

    case 'remove-avatar-photo':
      if(!STATE.data.avatar) STATE.data.avatar = {photo:null, video:null, name:"Andrea"};
      STATE.data.avatar.photo = null;
      persist(); showToast(t('deleted')); render();
      break;
    case 'save-avatar-video': {
      if(!STATE.data.avatar) STATE.data.avatar = {photo:null, video:null, name:"Andrea"};
      const vidEl = document.getElementById('avatar-video-input');
      STATE.data.avatar.video = vidEl ? (vidEl.value.trim() || null) : null;
      persist(); showToast(t('saved')); render();
      break;
    }
    case 'remove-avatar-video':
      if(!STATE.data.avatar) STATE.data.avatar = {photo:null, video:null, name:"Andrea"};
      STATE.data.avatar.video = null;
      persist(); showToast(t('deleted')); render();
      break;
    case 'save-avatar-name': {
      if(!STATE.data.avatar) STATE.data.avatar = {photo:null, video:null, name:"Andrea"};
      const nameEl = document.getElementById('avatar-name-input');
      STATE.data.avatar.name = nameEl ? nameEl.value.trim() || 'Andrea' : 'Andrea';
      persist(); showToast(t('saved')); render();
      break;
    }
    case 'save-vehicle': {
      captureModalFields();
      const id = el.getAttribute('data-id');
      const langsData = collectVehicleFieldsFromDom();
      if(id){
        const v = getVehicle(id);
        Object.assign(v, {icon: pendingEmoji || v.icon, name: langsData.name, desc: langsData.desc});
      } else {
        STATE.data.vehicles.push({ id: uid('veh'), icon: pendingEmoji||'🚗', name: langsData.name, desc: langsData.desc });
      }
      STATE.modal = null; persist(); showToast(t('saved')); render();
      break;
    }

    case 'save-access-code': {
      const inp = document.getElementById('access-code-input');
      const val = inp ? inp.value.trim() : '';
      STATE.data.accessCode = val;
      persist().then(()=>{ showToast(t('saved')); render(); });
      break;
    }
    case 'admin-logout':
      adminLogout();
      break;

    case 'close-modal':
      STATE.modal = null; render();
      break;
    case 'close-modal-bg':
      if(e.target === el){ STATE.modal = null; render(); }
      break;
  }
}

// Collect all 4-language field values currently in the DOM before switching tabs / saving
let capturedStopFields = null;
let capturedVehicleFields = null;
let capturedTourFields = null;

function captureModalFields(){
  if(STATE.modal && STATE.modal.type==='stop'){
    capturedStopFields = collectStopFieldsFromDom(capturedStopFields);
  } else if(STATE.modal && STATE.modal.type==='vehicle'){
    capturedVehicleFields = collectVehicleFieldsFromDom(capturedVehicleFields);
  } else if(STATE.modal && STATE.modal.type==='tour'){
    capturedTourFields = collectTourFieldsFromDom(capturedTourFields);
  }
}

function collectStopFieldsFromDom(prev){
  const base = prev || {name:{},teaser:{},narration:{}};
  LANGS.forEach(l=>{
    const nameEl = document.getElementById('stop-name-'+l);
    const teaserEl = document.getElementById('stop-teaser-'+l);
    const narrEl = document.getElementById('stop-narr-'+l);
    if(nameEl) base.name[l] = nameEl.value;
    if(teaserEl) base.teaser[l] = teaserEl.value;
    if(narrEl) base.narration[l] = narrEl.value;
  });
  return base;
}
function collectVehicleFieldsFromDom(prev){
  const base = prev || {name:{},desc:{}};
  LANGS.forEach(l=>{
    const nameEl = document.getElementById('veh-name-'+l);
    const descEl = document.getElementById('veh-desc-'+l);
    if(nameEl) base.name[l] = nameEl.value;
    if(descEl) base.desc[l] = descEl.value;
  });
  return base;
}
function collectTourFieldsFromDom(prev){
  const base = prev || {name:{},teaser:{},url:''};
  const urlEl = document.getElementById('tour-url');
  if(urlEl) base.url = urlEl.value;
  LANGS.forEach(l=>{
    const nameEl = document.getElementById('tour-name-'+l);
    const teaserEl = document.getElementById('tour-teaser-'+l);
    if(nameEl) base.name[l] = nameEl.value;
    if(teaserEl) base.teaser[l] = teaserEl.value;
  });
  return base;
}

function syncModalFieldsThenRerender(cb){
  if(STATE.modal.type==='stop') capturedStopFields = collectStopFieldsFromDom(capturedStopFields);
  if(STATE.modal.type==='vehicle') capturedVehicleFields = collectVehicleFieldsFromDom(capturedVehicleFields);
  if(STATE.modal.type==='tour') capturedTourFields = collectTourFieldsFromDom(capturedTourFields);
  cb();
  render();
  // restore captured field values into fresh DOM
  if(STATE.modal.type==='stop' && capturedStopFields){
    LANGS.forEach(l=>{
      const nameEl=document.getElementById('stop-name-'+l), teaserEl=document.getElementById('stop-teaser-'+l), narrEl=document.getElementById('stop-narr-'+l);
      if(nameEl) nameEl.value = capturedStopFields.name[l]||'';
      if(teaserEl) teaserEl.value = capturedStopFields.teaser[l]||'';
      if(narrEl) narrEl.value = capturedStopFields.narration[l]||'';
    });
  }
  if(STATE.modal.type==='tour' && capturedTourFields){
    const urlEl = document.getElementById('tour-url');
    if(urlEl) urlEl.value = capturedTourFields.url||'';
    LANGS.forEach(l=>{
      const nameEl=document.getElementById('tour-name-'+l), teaserEl=document.getElementById('tour-teaser-'+l);
      if(nameEl) nameEl.value = capturedTourFields.name[l]||'';
      if(teaserEl) teaserEl.value = capturedTourFields.teaser[l]||'';
    });
  }
}

/* ============================================================
   INIT
   ============================================================ */
loadData();

})();
</script>
